{% extends "admin/base.html" %}

{% block title %}Admin Login | TransitVoice{% endblock %}

{% block content %}
<section class="section-space">
    <div class="container">
        <div class="panel form-panel reveal admin-login-panel">
            <p class="eyebrow">Admin Portal</p>
            <h2>Login</h2>
            <p class="section-note">Use the admin email and password to review and resolve complaints.</p>
            <form method="POST" action="{{ url_for('admin_login') }}">
                <div class="form-grid" style="grid-template-columns: 1fr;">
                    <div class="form-group">
                        <label for="email">Admin Email</label>
                        <input type="email" id="email" name="email" required />
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required />
                    </div>
                </div>
                <button type="submit" class="btn-primary">Login to Admin</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
