{% extends "admin/base.html" %}

{% block title %}Complaint Analytics | TransitVoice Admin{% endblock %}

{% block content %}
<section class="section-space">
    <div class="container">
        <div class="panel reveal" style="padding: 1rem; max-width: 880px; margin: 0 auto;">
            <div class="section-inline-title" style="margin-bottom: 0.5rem;">
                <h3>Complaint Status Analysis</h3>
            </div>
            <div style="height: 340px;">
                <canvas id="statusChart" aria-label="Status analysis chart" role="img"></canvas>
            </div>
        </div>
        <p id="analyticsFallback" class="empty-state" style="display:none; margin-top: 0.8rem;">
            Graph library could not load right now. Please refresh the page or check internet connection.
        </p>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const analytics = {
        statusLabels: {{ analytics.status_labels | tojson }},
        statusValues: {{ analytics.status_values | tojson }}
    };

    const ensureChartData = (labels, values, fallbackLabel) => {
        if (!Array.isArray(labels) || !Array.isArray(values) || labels.length === 0 || values.length === 0) {
            return {
                labels: [fallbackLabel],
                values: [0]
            };
        }

        return { labels, values };
    };

    const showFallback = () => {
        const fallback = document.getElementById("analyticsFallback");
        if (fallback) {
            fallback.style.display = "block";
        }
    };

    const initCharts = () => {
        if (typeof Chart === "undefined") {
            showFallback();
            return;
        }

        const statusData = ensureChartData(analytics.statusLabels, analytics.statusValues, "No Status Data");

        const sharedOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: {
                        color: "#1f2937",
                        font: { family: "DM Sans" }
                    }
                }
            },
            scales: {
                x: {
                    ticks: { color: "#475569", font: { family: "DM Sans" } },
                    grid: { color: "rgba(148, 163, 184, 0.2)" }
                },
                y: {
                    beginAtZero: true,
                    ticks: { stepSize: 1, color: "#475569", font: { family: "DM Sans" } },
                    grid: { color: "rgba(148, 163, 184, 0.2)" }
                }
            }
        };

        new Chart(document.getElementById("statusChart"), {
            type: "bar",
            data: {
                labels: statusData.labels,
                datasets: [{
                    label: "Complaints",
                    data: statusData.values,
                    backgroundColor: ["#f59e0b", "#0ea5e9", "#16a34a", "#ef4444", "#8b5cf6"],
                    borderRadius: 10,
                    maxBarThickness: 56
                }]
            },
            options: sharedOptions
        });
    };

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initCharts);
    } else {
        initCharts();
    }
</script>
{% endblock %}
